name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting a feature! Help us understand your use case.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or workflow gap.
      placeholder: "I'm trying to... but I can't because..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Include API examples if possible.
      render: typescript
      placeholder: |
        // Example of how the feature would be used:
        import { meter } from 'llm-cost-meter';

        const response = await meter(streamingCall(), {
          feature: 'chat',
          onStreamEnd: (usage) => { ... }
        });
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Pricing / Models
        - Adapters (new output destination)
        - CLI / Reporting
        - Dashboard
        - Framework Integration (Express, Next.js, etc.)
        - Streaming Support
        - Performance
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternatives have you tried?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or links.
